# ————————————————————————————————————————————————————————————————
# HADEA FIELD LOG — GitHub Pages deploy (GitHub Actions source)
# Replaces the auto-generated "Deploy from a branch" pipeline, which
# wedged a failed deployment into the github-pages environment's Active
# slot and jammed every subsequent publish (4 Jul 2026).
#
# Publishes the repo-root static files as-is on every push to main
# (your "Add files via upload" commits count). No build/compile step.
# No secrets — auth is GitHub's built-in OIDC token. First-party actions
# only. `concurrency: cancel-in-progress` makes a new push SUPERSEDE a
# stuck deploy instead of queuing behind it, so the wedge can't recur.
#
# One-time setup: Settings → Pages → Source → "GitHub Actions".
# ————————————————————————————————————————————————————————————————
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:          # manual "Run workflow" button in the Actions tab

permissions:
  contents: read              # read repo files
  pages: write                # publish to Pages
  id-token: write             # OIDC token for deploy-pages auth (no stored secrets)

concurrency:
  group: pages
  cancel-in-progress: true    # a new run cancels a stuck in-progress one

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .             # the site is the repo root (index.html at top level)
      - id: deployment
        uses: actions/deploy-pages@v4
