<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hadea Log">
<meta name="theme-color" content="#14161A">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Hadea Field Log — Hell is Us Platinum Tracker</title>
<style>
  :root{
    --bg:#14161A; --panel:#1B1F24; --line:#2A2F2A; --line2:#22261F;
    --text:#D8DCD3; --bright:#E8E4D8; --muted:#7C8577; --dim:#575E53; --faint:#4A5046;
    --cyan:#6FD5C6; --amber:#D9A441; --red:#C4574A; --story:#7B93B8;
    --mono:'SFMono-Regular',ui-monospace,'Cascadia Mono','Roboto Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg)}
  body{
    color:var(--text);font-family:var(--mono);font-size:14px;line-height:1.55;
    -webkit-text-size-adjust:100%;
  }
  #app{
    max-width:720px;margin:0 auto;
    padding:calc(20px + env(safe-area-inset-top)) 14px calc(80px + env(safe-area-inset-bottom));
  }
  .kicker{font-size:10px;letter-spacing:.22em;color:var(--muted);margin-bottom:4px}
  h1{font-size:26px;letter-spacing:.14em;margin:0 0 14px;font-weight:700;color:var(--bright)}
  h2{font-size:17px;margin:0;letter-spacing:.08em;color:var(--bright);font-weight:700}
  header{border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:14px}
  .readout{font-size:13px;letter-spacing:.1em;margin-bottom:8px}
  .sub{font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:.04em}
  .bar{height:4px;background:#22271F;border-radius:2px;overflow:hidden}
  .bar>div{height:100%;background:linear-gradient(90deg,#3E8F84,var(--cyan));transition:width .4s ease}
  .blink{animation:blink 1.1s steps(1) infinite;margin-left:6px;color:var(--cyan)}
  @keyframes blink{50%{opacity:0}}
  @media (prefers-reduced-motion:reduce){.blink{animation:none}}
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 22px}
  button.chip{
    font-family:var(--mono);font-size:11px;letter-spacing:.06em;background:transparent;
    border:1px solid #3A3F38;color:var(--muted);border-radius:3px;padding:7px 12px;cursor:pointer;
  }
  button.chip.on{border-color:var(--amber);color:var(--amber)}
  button.chip.go{border-color:var(--cyan);color:var(--cyan)}
  button.chip.danger{border-color:var(--red);color:var(--red)}
  button.chip:disabled{border-color:#3A3F38;color:var(--faint);cursor:default}
  button:focus-visible,textarea:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  section{margin-bottom:30px}
  .sechead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:10px}
  .seccount{font-size:12px;color:var(--muted)}
  .deadline{
    border:1px solid rgba(196,87,74,.4);background:rgba(196,87,74,.08);color:#DE9186;
    font-size:12px;padding:10px 12px;border-radius:3px;margin-bottom:12px;
  }
  .deadline b{color:var(--red);font-weight:400;margin-right:4px}
  .row{border-bottom:1px solid var(--line2);padding:2px 0}
  .row.done{opacity:.45}
  .rowtop{display:flex;align-items:flex-start;gap:10px;padding:10px 0}
  .cb{
    width:22px;height:22px;min-width:22px;border-radius:3px;border:1.5px solid var(--faint);
    display:inline-flex;align-items:center;justify-content:center;cursor:pointer;margin-top:1px;
    font-size:13px;background:transparent;color:var(--bg);padding:0;
  }
  .cb.on{border-color:var(--cyan);background:var(--cyan);font-weight:700}
  .rowlabel{
    display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;background:none;border:none;
    color:inherit;font-family:inherit;font-size:13.5px;text-align:left;cursor:pointer;padding:0;
    flex:1;line-height:1.5;
  }
  .row.done .rowtitle{text-decoration:line-through}
  .tag{
    font-size:9px;letter-spacing:.16em;border:1px solid;border-radius:2px;padding:1px 5px;
    flex-shrink:0;transform:translateY(-1px);
  }
  .plus{color:var(--faint);margin-left:auto;flex-shrink:0}
  .detail{
    font-size:12.5px;color:#9AA394;margin-left:10px;padding:0 0 14px 20px;
    border-left:2px solid var(--line);line-height:1.65;
  }
  .notehint{font-size:11.5px;color:var(--muted);margin-bottom:10px;line-height:1.6}
  .noterow{display:flex;gap:10px;align-items:flex-start;border-bottom:1px solid var(--line2);padding:10px 0}
  .notetext{font-size:13px;color:var(--text);line-height:1.55;white-space:pre-wrap;word-break:break-word}
  .notets{font-size:10px;color:var(--dim);margin-top:3px;letter-spacing:.1em}
  .notebtn{
    background:none;border:1px solid #3A3F38;border-radius:3px;color:var(--muted);
    font-family:var(--mono);font-size:11px;padding:4px 8px;cursor:pointer;flex-shrink:0;margin-top:2px;
  }
  .notebtn.on{color:var(--cyan);border-color:var(--cyan)}
  .inputrow{display:flex;gap:8px;margin-bottom:14px;align-items:stretch}
  textarea{
    flex:1;background:var(--panel);border:1px solid #3A3F38;border-radius:3px;color:var(--text);
    font-family:var(--mono);font-size:13px;padding:9px 10px;line-height:1.5;resize:vertical;min-height:44px;width:100%;
  }
  .hintpanel{padding:4px 0 14px;border-bottom:1px solid var(--line2)}
  .hintbtns{display:flex;gap:8px;flex-wrap:wrap}
  .hintstatus{font-size:11px;color:var(--cyan);letter-spacing:.06em;margin-top:10px;line-height:1.6}
  footer{
    font-size:10.5px;color:var(--dim);border-top:1px solid var(--line);padding-top:14px;
    letter-spacing:.03em;line-height:1.7;
  }
  .savestate{font-size:11px;letter-spacing:.04em;margin-top:6px}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="importFile" accept=".json,application/json" style="display:none">
<script>
"use strict";
const HINT_LEVELS = [
  { n: 1, label: "Nudge", color: "#6FD5C6", desc: "a vague directional nudge ONLY: no location names, no item names, no puzzle mechanics. Just tell the player what to pay attention to or reconsider, in one or two sentences." },
  { n: 2, label: "Hint", color: "#D9A441", desc: "a concrete hint: name the relevant area or the KIND of thing they should look for or do, but do not state the final solution, code, or exact item." },
  { n: 3, label: "Spoil it", color: "#C4574A", desc: "the full solution, stated plainly and step by step. Still do not reveal story plot points, character fates, or anything beyond this specific puzzle/objective." },
];

const SECTIONS = [
  {
    id: "setup",
    kicker: "PHASE 00",
    title: "Before you start",
    deadline: null,
    items: [
      {
        id: "s1", tag: "RULE", title: "Update the game to the latest patch",
        detail:
          "Several launch-window trophy bugs are fixed in patches. Patch 1.5 (Jan 2026) fixed a Lend an Ear blocker (skipping a chat with Lukhan before handing over the radio) and trophy-count issues; a Sept 2025 patch fixed counters polluted by demo/other-save data. Playing on 1.6+ removes most of the horror stories you'll read in older threads.",
      },
      {
        id: "s2", tag: "RULE", title: "Never spend Lymbic Shards on consumables",
        detail:
          "Three trophies (To the Teeth, Accessorizing, Good Vibrations) need maxed upgrades. Once every Timeloop is closed, enemies stop respawning and shards become finite. Hoard every shard for upgrades and you cannot miss these.",
      },
      {
        id: "s3", tag: "RULE", title: "Kill the colored Haze itself, every time",
        detail:
          "Some enemies spawn a colored abstract blob (Haze). You need 40 Haze kills at each of tier I, II and III. If you burst the carrier down before the Haze spawns, or kill the pale enemy without popping the blob, the kill does NOT count — a PowerPyx reader finished world cleanup stuck at 39/40 tier III. Let the blob appear, then destroy it. Check the PS5 trophy progress trackers periodically.",
      },
      {
        id: "s4", tag: "RULE", title: "Talk to every named NPC the moment you see them",
        detail:
          "Lend an Ear needs a conversation with all 21 dialogue NPCs (the ones that open a full dialogue screen). Several die or relocate as the story moves. Habit: exhaust dialogue immediately on first sight. The checklist below flags every risky one at the right moment.",
      },
      {
        id: "s5", tag: "RULE", title: "Wear every cap as soon as you find it",
        detail:
          "Passion for Fashion = equip all 10 baseball caps. Do it from the Loadout menu when each drops, and make sure the 'no hat' cosmetic toggle is OFF when equipping, or the game may not register the wear.",
      },
      {
        id: "s6", tag: "RULE", title: "Manual-save at save points before turning anything in",
        detail:
          "There are no separate save slots, so a pre-turn-in save is your only short rewind if a conversation goes sideways. Difficulty doesn't matter for any trophy — play on whatever is fun.",
      },
    ],
  },
  {
    id: "act1",
    kicker: "PHASE 01",
    title: "Act 1",
    deadline:
      "POINT OF NO RETURN: placing the first Keystone at Lake Cynon ends Act 1. Do not travel to Lake Cynon for the story until every box below is checked.",
    items: [
      { id: "a1", tag: "STORY", title: "Senedra Forest — Ernest Caddel", detail: "In the basement of the first house. Story-required, can't be missed — listed so the NPC counter stays in order." },
      { id: "a2", tag: "STORY", title: "Senedra Forest — wounded soldier by the APC", detail: "Just after Caddel's house. Story-required." },
      { id: "a3", tag: "MISS", title: "Jova — Captain Vaas", detail: "On the platform at the entrance to the town of Jova. He dies when Act 2 begins — if you never spoke to him, Lend an Ear is gone. Talk to him now." },
      { id: "a4", tag: "MISS", title: "Jova — Abbot Jaffer", detail: "On the road between Captain Vaas and the blacksmith shop. He later relocates; safest to talk here." },
      { id: "a5", tag: "MISS", title: "Jova — Rebecca", detail: "On the roof of the house with the treehouse in the yard, near Captain Vaas. She later relocates; talk here." },
      { id: "a6", tag: "MISS", title: "Good Deed 3 — Land of Milk and Honey", detail: "Speak with the woman in the underground level of the house on Jova's west side. Take the empty baby bottles to Ernest Caddel in Senedra Forest, bring the milk back to her." },
      { id: "a7", tag: "MISS", title: "Good Deed 4 — Love Thy Neighbour  ★ feeds Ever After", detail: "Speak to the woman in the house near Abbot Jaffer. Grab the Bloodied Plushie from the tree with the hanging bodies east of Jova, trade it to the man in the house above the milk-quest woman, then trade the picture you get back to the first woman. Must be done in Act 1 — one of the trophies for gathering everyone later depends on it." },
      { id: "a8", tag: "MISS", title: "Good Deed 5 — Asunder", detail: "Find the 'Worried Wife' letter behind the house with the drunk soldier in Jova; deliver it to the man by the excavator at the area entrance." },
      { id: "a9", tag: "MISS", title: "Good Deed 6 — Performance of a Lifetime (start)", detail: "Talk to the man playing violin on the truck near Captain Vaas. The sheet music he wants is in Vyssa Hills — you'll close this out below." },
      { id: "a10", tag: "STORY", title: "Jova — Victor Gaz", detail: "At the blacksmith shop after the tunnel rescue. Story-required." },
      { id: "a11", tag: "WARN", title: "Vyssa Hills — do NOT give Atticus the ON Vehicle Keys", detail: "Handing over the keys is Good Deed 10 and it empties the camp — done too early it permanently voids Good Deed 11. You'll find the keys after closing this area's Timeloop. Keep them in your pocket until the Act 2 step tells you otherwise." },
      { id: "a12", tag: "MISS", title: "Good Deed 11 — On Death's Door", detail: "Find the Atenolol pill bottle in Vyssa Hills and give it to the woman at the camp in the north of the area. Must be done before Atticus gets the keys." },
      { id: "a13", tag: "STORY", title: "Vyssa Hills — Vitalis", detail: "Northeast of the area. Story-required." },
      { id: "a14", tag: "STORY", title: "Vyssa Hills — Tania Alver", detail: "West of the area. Story-required." },
      { id: "a15", tag: "MISS", title: "Vyssa Hills — Atticus (talk only, no keys)", detail: "On the paths between Tania's location and the hideout. Converse for the NPC counter. Keys stay put." },
      { id: "a16", tag: "MISS", title: "Vyssa Hills — Gildas Brom", detail: "Inside the hideout, available after the story beat there. He's also who you'll return Good Deed rewards to all game — get him logged now." },
      { id: "a17", tag: "MISS", title: "Good Deed 6 — Performance of a Lifetime (finish)", detail: "The sheet music is in Vyssa Hills. Carry it back to the violinist in Jova." },
      { id: "a18", tag: "RULE", title: "Gate check — everything above done?", detail: "If yes, head to Lake Cynon and finish Act 1. If anything above is unchecked, do it first; it cannot be recovered later." },
    ],
  },
  {
    id: "act2",
    kicker: "PHASE 02",
    title: "Act 2",
    deadline:
      "POINT OF NO RETURN: collecting/placing the remaining Keystones. Simple safety rule from PowerPyx — stay out of the Plains of Mist and the Museum until every box below is checked.",
    items: [
      { id: "b1", tag: "MISS", title: "FIRST: Good Deed 12 — Man's Best Friend  ★ feeds Ever After", detail: "Do this before anything else in Act 2, and strictly before touching anything related to the abbey (which relocates Jaffer and Rebecca). In Jova, release the dog the soldier was sitting beside, then take the collar to the man at the camp in Vyssa Hills. Done late, the dog never reaches the lake and Ever After is lost. (One reader reports the trophy still popped giving the collar after the couple moved near the mine — but the guide author's timing is the only verified-safe route.)" },
      { id: "b2", tag: "MISS", title: "Good Deed 10 — Heart of Gold (NOW give Atticus the keys)", detail: "With Good Deeds 11 and 12 complete, hand Atticus the ON Vehicle Keys. Order matters; this is the moment." },
      { id: "b3", tag: "MISS", title: "Talju — Boro Juven, BEFORE entering town", detail: "In the garage near the APC at the area start. If ignored, he dies without ever being logged (he's one of the flare recipients below). Talk first, then proceed." },
      { id: "b4", tag: "MISS", title: "Talju — Good Deeds 13–16: A Light in the Dark (all four flares)", detail: "Grab the flares in front of the Town Hall and hand one to each of the four people around town. Deadline: before killing the Hollow in the Town Hall parking lot (it makes all survivors leave). To be extra safe, finish all four before giving the radio to Lukhan. These count as four separate Good Deeds — missing one flare costs both Man of the People and a Relic." },
      { id: "b5", tag: "STORY", title: "Talju — Caspian Fran", detail: "In the town hall. Story-required." },
      { id: "b6", tag: "MISS", title: "Good Deed 2 — Forlorn Fate (start)", detail: "In the Vanderlyn Trust building in Talju, pick up the Flame symbol and the Senedra Mountain map." },
      { id: "b7", tag: "MISS", title: "Talju — Lukhan Fran (talk BEFORE the radio hand-in)", detail: "At the back of the school. Pre-patch-1.5 this was the infamous Lend an Ear killer — handing the radio without talking first voided the trophy. It's fixed now, but the safe order is still: converse, then quest item." },
      { id: "b8", tag: "MISS", title: "Good Deed 7 — Waylaid (part 1 of 3)", detail: "Open the pharmacy in Talju and take the Metformin pill bottle. Two more pieces below." },
      { id: "b9", tag: "MISS", title: "Senedra Forest — Good Deed 2 (finish)", detail: "Open the door in the trench area with the Flame symbol and trade the Senedra Mountain map to the woman inside." },
      { id: "b10", tag: "MISS", title: "Marastan — Talis", detail: "On a balcony in the upper town. Easy to walk past; he's a Lend an Ear requirement." },
      { id: "b11", tag: "MISS", title: "Marastan — Father Bramante", detail: "In the fenced area in front of the statue, near the radio tower." },
      { id: "b12", tag: "STORY", title: "Lethe, National Library — Iblis", detail: "Upper floor. Story-required. (The Library and the Ministry are two separate map destinations side by side.)" },
      { id: "b13", tag: "WARN", title: "Lethe, Ministry — do not leave until Good Deed 22 is done", detail: "Leaving the Ministry mid-visit kills the ON Soldier and instantly fails the deed. (One player reports leaving was safe because they hadn't talked to her yet — treat that as unverified and just finish before exiting.)" },
      { id: "b14", tag: "MISS", title: "Ministry — Maeve Tristana, BEFORE killing the ranged Hollow", detail: "The distressed woman locked in a room (left at the king's portrait; the enemy is to the right). Speak to her before defeating the ranged Hollow or she may never register in the People menu. If you botched it: players report she can appear later in the parking garage — check there before writing her off." },
      { id: "b15", tag: "MISS", title: "Ministry — Good Deed 7 (part 2 of 3)", detail: "Find the Satellite Radio in this location." },
      { id: "b16", tag: "MISS", title: "Ministry — Good Deed 22: Incognito", detail: "Use the keycard from the parking garage on the top-floor door to get the Woman's Clothing, then take it to the ON Soldier on the top floor. Only then is it safe to leave the Ministry." },
      { id: "b17", tag: "MISS", title: "Acasa Marshes — Good Deed 7: Waylaid (finish)", detail: "Southwest of town at the stone pillar, two ON Soldiers wait in a room underneath. Trade them the Metformin and the Satellite Radio. This is the final missable Good Deed — after this, only the Museum NPCs remain time-sensitive." },
    ],
  },
  {
    id: "museum",
    kicker: "PHASE 03",
    title: "Auriga Museum",
    deadline:
      "Last missable zone in the game. One switch here can permanently kill an NPC you need.",
    items: [
      { id: "c1", tag: "WARN", title: "B1 switch: clear the room BEFORE flipping PURPLE → YELLOW", detail: "At the B1 switch with PURPLE and YELLOW options: kill every Hollow in the large room opposite the Timeloop first. Flip to YELLOW early and Dr. Ballam Lamech — trapped in the observation room — is killed when the doors open." },
      { id: "c2", tag: "STORY", title: "B3 — Dr. Marga Hamil", detail: "In the laboratory. Story-required." },
      { id: "c3", tag: "STORY", title: "B1 — Seo Kagin", detail: "In the training area. Story-required." },
      { id: "c4", tag: "MISS", title: "B1 — Dr. Ballam Lamech", detail: "In the large room opposite the Timeloop, once the enemies are dead and the doors are open. He only survives if you handled the switch correctly." },
      { id: "c5", tag: "MISS", title: "B4 — Dr. Mabden, via the intercom", detail: "In the Timeloop room. TALK through the intercom first — starting the fight directly skips the conversation and he's lost (a reader learned this the hard way). This is typically the NPC who pops Lend an Ear." },
      { id: "c6", tag: "RULE", title: "Milestone: all missables secured", detail: "From here on, per PowerPyx, 'everything else can be completed whenever you want, now or after finishing the story.' Breathe. Explore freely." },
    ],
  },
  {
    id: "endgame",
    kicker: "PHASE 04",
    title: "Late game & cleanup",
    deadline:
      "One soft deadline left: audit your Haze counters BEFORE closing your final Timeloops. Everything else is safe after the credits.",
    items: [
      { id: "d1", tag: "WARN", title: "Audit Phol trackers before closing the last Timeloops", detail: "Closing all Timeloops stops enemy respawns. Open the PS5 trophy list and check progress on the three 40-kill Haze trophies (tiers I, II, III) and the kill-every-enemy-type trophies. Farm any shortfall while things still respawn — tier III at 39/40 with nothing left alive is the classic heartbreak." },
      { id: "d2", tag: "SAFE", title: "Max upgrades: To the Teeth, Accessorizing, Good Vibrations", detail: "Upgrade one weapon of each type to Grade 5, plus the gear/vest lines. If you hoarded shards per the ground rules, you'll have enough banked even after respawns end." },
      { id: "d3", tag: "SAFE", title: "Post-credits free roam", detail: "After Act 3, reloading your save drops you back in the final area with full travel. Clean up remaining Mysteries (43 total), Vaults, research items, caps, glyphs and drone modules at leisure — none are missable." },
      { id: "d4", tag: "SAFE", title: "Legend of the Phol — clear every zone", detail: "Close all 14 Timeloops, then hunt every remaining enemy until each zone's APC map reads 'Threats: Clear.' Known snags from forum threads: a hidden mine room in Vyssa Hills (mine entrance in the ruin by the snake head → down the ladder → first left) holds two easily-missed enemies; and the map's hover status can display stale info — physically re-enter a zone to refresh it." },
      { id: "d5", tag: "SAFE", title: "If one thing slipped: the cross-save carryover", detail: "Multiple PowerPyx readers confirmed (Sept–Nov 2025) that Good Deed/Relic progression carries across save files — start a fresh save, beeline only the missed deed, and the cumulative trophy pops in 1–2 hours. Not re-verified on the 2026 patches, but it's your parachute before considering a full replay. A launch-era trophy-tracker turn-in exploit also existed; treat it as likely patched." },
    ],
  },
];


const BUILD = "7.0 · STANDALONE";
const KEY = "hiu-plat-v1";
const ALL_ITEMS = SECTIONS.flatMap(s => s.items);
const MISS_IDS = ALL_ITEMS.filter(i => i.tag === "MISS" || i.tag === "WARN").map(i => i.id);
const TAG_COLOR = { MISS:"var(--amber)", WARN:"var(--red)", STORY:"var(--story)", RULE:"var(--cyan)", SAFE:"var(--muted)" };
const TAG_LABEL = { MISS:"MISSABLE", WARN:"WARNING", STORY:"STORY", RULE:"RULE", SAFE:"SAFE" };

// ————— state —————
let state = {
  checked:{}, notes:[], open:{}, hintOpen:{}, filterMiss:false,
  confirmReset:false, draft:"", stuckDraft:"", saveState:"idle",
  hintMsg:{}, copied:false,
};

function loadState(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){
      const p = JSON.parse(raw);
      if(p && (p.checked || p.notes)){ state.checked = p.checked||{}; state.notes = Array.isArray(p.notes)?p.notes:[]; }
    }
    state.saveState = "saved";
  }catch(e){ state.saveState = "error"; }
}
function persist(){
  try{
    localStorage.setItem(KEY, JSON.stringify({checked:state.checked, notes:state.notes}));
    state.saveState = "saved";
  }catch(e){ console.error(e); state.saveState = "error"; }
}

// ————— hint handoff —————
function hintPrompt(topic, levelN){
  const lv = HINT_LEVELS.find(l => l.n === levelN);
  return 'You are a spoiler-careful hint assistant for the video game "Hell is Us" ' +
    '(2025, Rogue Factor — third-person action-adventure set in the country of Hadea; ' +
    'no map markers, puzzle- and clue-driven). I am stuck on the following:\n\n' +
    '"' + topic + '"\n\n' +
    'If you are not certain what this refers to or what the solution is, use web search ' +
    '(good sources: powerpyx.com, game8.co, gamerguides.com) to find out first. ' +
    'Then reply with ' + lv.desc + '\n\n' +
    'Hard rules: reveal nothing beyond what this hint level permits; never mention story plot points or twists; ' +
    'no preamble; 80 words maximum.';
}
async function hintGo(panelId, topic, levelN){
  const prompt = hintPrompt(topic.trim(), levelN);
  let copied = false;
  try{ await navigator.clipboard.writeText(prompt); copied = true; }
  catch(e){ /* clipboard can fail outside user-gesture edge cases */ }
  state.hintMsg[panelId] = copied
    ? "Prompt copied ✓ — opening Claude. If the message box is empty, paste."
    : "Couldn't copy automatically — opening Claude; use Copy prompt below.";
  render();
  window.open("https://claude.ai/new?q=" + encodeURIComponent(prompt), "_blank");
}

// ————— helpers —————
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function stamp(){ return new Date().toLocaleDateString(undefined,{month:"short",day:"numeric"}); }

// ————— actions —————
function toggleCheck(id){ state.checked[id] = !state.checked[id]; persist(); render(); }
function toggleOpen(id){ state.open[id] = !state.open[id]; render(); }
function toggleHint(id){ state.hintOpen[id] = !state.hintOpen[id]; render(); }
function addNote(){
  const t = state.draft.trim(); if(!t) return;
  state.notes.unshift({id:"n"+Date.now(), text:t, ts:stamp()});
  state.draft = ""; persist(); render();
}
function delNote(id){ state.notes = state.notes.filter(n => n.id !== id); persist(); render(); }
function copyNotes(){
  const txt = state.notes.map(n => "["+n.ts+"] "+n.text).join("\n");
  navigator.clipboard.writeText(txt).then(()=>{ state.copied = true; render();
    setTimeout(()=>{ state.copied = false; render(); }, 2000); });
}
function exportData(){
  const blob = new Blob([JSON.stringify({checked:state.checked, notes:state.notes, build:BUILD, exportedAt:new Date().toISOString()}, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "hadea-field-log-backup-" + new Date().toISOString().slice(0,10) + ".json";
  document.body.appendChild(a); a.click(); a.remove();
}
function importData(file){
  const r = new FileReader();
  r.onload = () => {
    try{
      const p = JSON.parse(r.result);
      if(!p || (typeof p.checked !== "object" && !Array.isArray(p.notes))) throw new Error("bad shape");
      if(!confirm("Replace current progress and notes with this backup?")) return;
      state.checked = p.checked || {};
      state.notes = Array.isArray(p.notes) ? p.notes : [];
      persist(); render();
    }catch(e){ alert("That file doesn't look like a Field Log backup."); }
  };
  r.readAsText(file);
}
function resetRun(){ state.checked = {}; state.confirmReset = false; persist(); render(); }

// ————— render —————
function hintPanelHTML(panelId, topic){
  const usable = topic && topic.trim().length > 2;
  const btns = HINT_LEVELS.map(lv =>
    '<button class="chip" style="'+(usable ? "border-color:"+lv.color+";color:"+lv.color : "")+'" '+
    (usable ? "" : "disabled ")+'data-act="hint" data-panel="'+panelId+'" data-level="'+lv.n+'">'+esc(lv.label)+'</button>'
  ).join("");
  const msg = state.hintMsg[panelId];
  const copyBtn = msg ? '<button class="chip" data-act="copyprompt" data-panel="'+panelId+'">Copy prompt</button>' : "";
  return '<div class="hintpanel"><div class="hintbtns">'+btns+copyBtn+'</div>'+
    (msg ? '<div class="hintstatus">'+esc(msg)+'</div>' : "")+'</div>';
}

function render(){
  const missDone = MISS_IDS.filter(id => state.checked[id]).length;
  const allDone = ALL_ITEMS.filter(i => state.checked[i.id]).length;
  const pct = Math.round(missDone / MISS_IDS.length * 100);
  const ss = state.saveState;
  const saveHTML = ss==="saved" ? '<span style="color:var(--cyan)">SAVED ✓ · on this device</span>'
    : ss==="error" ? '<span style="color:var(--red)">SAVE FAILED — storage unavailable (private browsing?)</span>' : "";

  let h = '<header>'+
    '<div class="kicker">HADEA FIELD LOG · SINGLE-RUN PLATINUM · BUILD '+BUILD+'</div>'+
    '<h1>HELL IS US</h1>'+
    '<div class="readout"><span style="color:var(--muted)">MISSABLES SECURED&nbsp;</span>'+
    '<span style="color:'+(pct===100?"var(--cyan)":"var(--bright)")+'">'+missDone+'/'+MISS_IDS.length+'</span>'+
    '<span class="blink">▌</span></div>'+
    '<div class="bar"><div style="width:'+pct+'%"></div></div>'+
    '<div class="sub">'+(pct===100 ? "THREATS: CLEAR — nothing left in this list can be lost."
      : "All boxes checked: "+allDone+"/"+ALL_ITEMS.length+" · tap any row for the how-to")+'</div>'+
    '<div class="savestate">'+saveHTML+'</div></header>';

  h += '<div class="controls">'+
    '<button class="chip'+(state.filterMiss?" on":"")+'" data-act="filter">'+(state.filterMiss?"◉":"○")+' Missables &amp; warnings only</button>'+
    (state.confirmReset
      ? '<button class="chip danger" data-act="resetgo">Confirm reset</button><button class="chip" data-act="resetno">Keep</button>'
      : '<button class="chip" data-act="reset">Reset run</button>')+
    '<button class="chip" data-act="export">Export backup</button>'+
    '<button class="chip" data-act="import">Import backup</button>'+
    '</div>';

  // Field notes
  h += '<section><div class="sechead"><div><div class="kicker">PERSONAL LOG</div><h2>Field notes</h2></div>'+
    '<div class="seccount">'+state.notes.length+'</div></div>'+
    '<div class="notehint">Sealed doors, unsolved symbols, places to revisit — log them here before the game lets you forget. Notes survive a run reset. Nudge hands the note to Claude at the spoiler level you pick.</div>'+
    '<div class="inputrow"><textarea id="draft" rows="2" placeholder="e.g. Locked tower in Vyssa Hills, pedestal wants an item…">'+esc(state.draft)+'</textarea>'+
    '<button class="chip'+(state.draft.trim()?" go":"")+'" data-act="lognote" '+(state.draft.trim()?"":"disabled")+' style="align-self:stretch">Log note</button></div>'+
    (state.notes.length ? '<div style="margin-bottom:10px"><button class="chip'+(state.copied?" go":"")+'" data-act="copynotes">'+(state.copied?"Copied ✓":"Copy all notes")+'</button></div>' : "");
  for(const n of state.notes){
    h += '<div class="noterow"><div style="flex:1"><div class="notetext">'+esc(n.text)+'</div><div class="notets">'+esc(n.ts)+'</div></div>'+
      '<button class="notebtn'+(state.hintOpen[n.id]?" on":"")+'" data-act="nudge" data-id="'+n.id+'">Nudge?</button>'+
      '<button class="notebtn" data-act="delnote" data-id="'+n.id+'" aria-label="Delete note">✕</button></div>';
    if(state.hintOpen[n.id]) h += hintPanelHTML(n.id, n.text);
  }
  h += '</section>';

  // Freeform hint box
  h += '<section><div class="sechead"><div><div class="kicker">ARCHIVE QUERY</div><h2>Stuck on something else?</h2></div></div>'+
    '<div class="notehint">Describe where you\'re stuck and pick how much you want revealed. Nudge points, Hint narrows, Spoil it answers. Each button copies a ready-made prompt and opens Claude.</div>'+
    '<textarea id="stuck" rows="2" placeholder="e.g. Can\'t figure out the pillar puzzle in the marshes temple…" style="margin-bottom:8px">'+esc(state.stuckDraft)+'</textarea>'+
    hintPanelHTML("stuck", state.stuckDraft)+'</section>';

  // Checklist sections
  for(const sec of SECTIONS){
    const items = state.filterMiss ? sec.items.filter(i => i.tag==="MISS"||i.tag==="WARN") : sec.items;
    if(!items.length) continue;
    const done = sec.items.filter(i => state.checked[i.id]).length;
    h += '<section><div class="sechead"><div><div class="kicker">'+esc(sec.kicker)+'</div><h2>'+esc(sec.title)+'</h2></div>'+
      '<div class="seccount">'+done+'/'+sec.items.length+'</div></div>';
    if(sec.deadline) h += '<div class="deadline"><b>⚠</b> '+esc(sec.deadline)+'</div>';
    for(const it of items){
      const on = !!state.checked[it.id], op = !!state.open[it.id];
      h += '<div class="row'+(on?" done":"")+'"><div class="rowtop">'+
        '<button class="cb'+(on?" on":"")+'" data-act="check" data-id="'+it.id+'" aria-label="'+(on?"Mark incomplete":"Mark complete")+'">'+(on?"✓":"")+'</button>'+
        '<button class="rowlabel" data-act="open" data-id="'+it.id+'">'+
        '<span class="tag" style="color:'+TAG_COLOR[it.tag]+';border-color:'+TAG_COLOR[it.tag]+'">'+TAG_LABEL[it.tag]+'</span>'+
        '<span class="rowtitle">'+esc(it.title)+'</span><span class="plus">'+(op?"−":"+")+'</span></button></div>'+
        (op ? '<div class="detail">'+esc(it.detail)+'</div>' : "")+'</div>';
    }
    h += '</section>';
  }

  h += '<footer>Compiled 2 Jul 2026 from PowerPyx (trophy, missables &amp; walkthrough pages + reader reports), Push Square, Game8, Neoseeker, PSNProfiles &amp; TrueTrophies threads, and official patch notes (1.4–1.6). Data lives in this browser\'s storage on this device — use Export backup for a portable copy.</footer>';

  document.getElementById("app").innerHTML = h;
}

// ————— events —————
document.getElementById("app").addEventListener("click", e => {
  const b = e.target.closest("[data-act]"); if(!b) return;
  const act = b.dataset.act, id = b.dataset.id;
  if(act==="check") toggleCheck(id);
  else if(act==="open") toggleOpen(id);
  else if(act==="nudge") toggleHint(id);
  else if(act==="delnote") delNote(id);
  else if(act==="lognote") addNote();
  else if(act==="copynotes") copyNotes();
  else if(act==="filter"){ state.filterMiss = !state.filterMiss; render(); }
  else if(act==="reset"){ state.confirmReset = true; render(); }
  else if(act==="resetno"){ state.confirmReset = false; render(); }
  else if(act==="resetgo") resetRun();
  else if(act==="export") exportData();
  else if(act==="import") document.getElementById("importFile").click();
  else if(act==="hint"){
    const panel = b.dataset.panel;
    const topic = panel==="stuck" ? state.stuckDraft : (state.notes.find(n=>n.id===panel)||{}).text||"";
    hintGo(panel, topic, Number(b.dataset.level));
  }
  else if(act==="copyprompt"){
    const panel = b.dataset.panel;
    const topic = panel==="stuck" ? state.stuckDraft : (state.notes.find(n=>n.id===panel)||{}).text||"";
    navigator.clipboard.writeText(hintPrompt(topic.trim(), 2));
  }
});
document.getElementById("app").addEventListener("input", e => {
  if(e.target.id==="draft"){ state.draft = e.target.value;
    const btn = document.querySelector('[data-act="lognote"]');
    if(btn){ btn.disabled = !state.draft.trim(); btn.classList.toggle("go", !!state.draft.trim()); } }
  if(e.target.id==="stuck"){ state.stuckDraft = e.target.value;
    // re-enable hint buttons without full re-render (keeps focus)
    document.querySelectorAll('[data-act="hint"][data-panel="stuck"]').forEach((el,i)=>{
      const lv = HINT_LEVELS[i]; const ok = state.stuckDraft.trim().length > 2;
      el.disabled = !ok; el.style.cssText = ok ? "border-color:"+lv.color+";color:"+lv.color : "";
    }); }
});
document.getElementById("importFile").addEventListener("change", e => {
  if(e.target.files && e.target.files[0]) importData(e.target.files[0]);
  e.target.value = "";
});

loadState();
render();
</script>
</body>
</html>
