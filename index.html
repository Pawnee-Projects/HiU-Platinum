<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hadea Log">
<meta name="theme-color" content="#08131C">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Hadea Field Log — Hell is Us Platinum Tracker</title>
<style>
  /* ————— HADEA COLD (Roadmap 10) — two-layer colour —————
     Content accents (success/missable/warning/story) colour GAME CONTENT only;
     ALL interface chrome is hue-free neutral. Datapad = dark (default :root);
     Parchment = light (via prefers-color-scheme + [data-theme] manual override).
     Base hexes are locked (OKLCH-placed); every tint/fill derives via color-mix. */
  :root{
    /* ground */
    --bg:#08131C; --panel:#102130; --line:#21394C; --line2:#152430;
    --text:#BCC8D4; --bright:#E4EEF6; --muted:#6F7F8F; --dim:#4A5A6A; --faint:#34424F;
    /* content accents — game content ONLY */
    --success:#46D4B2; --missable:#CDA557; --warning:#F2706C; --story:#6E9AD0;
    /* interface chrome — hue-free (Datapad = Neutral) */
    --chrome:#6E7A86; --chrome-active:#D8E0E9;
    /* derived (adapt per mode — re-resolve against the live ground/accent tokens) */
    --detail:color-mix(in srgb, var(--text) 78%, var(--muted));
    --mono:'SFMono-Regular',ui-monospace,'Cascadia Mono','Roboto Mono',Menlo,Consolas,monospace;
  }
  /* Parchment (light) — follow iOS unless a manual theme is set */
  @media (prefers-color-scheme: light){
    :root:not([data-theme]){
      --bg:#DCE3EB; --panel:#E8EDF2; --line:#BEC8D2; --line2:#D0D8E0;
      --text:#10202E; --bright:#06111C; --muted:#556270; --dim:#78838F; --faint:#A2AEBA;
      --success:#0A9078; --missable:#8A6210; --warning:#CC3F3B; --story:#35588C;
      --chrome:#5F6076; --chrome-active:#33334A;
    }
  }
  /* Manual override — attribute specificity beats the media query, so a picked theme always wins */
  :root[data-theme="dark"]{
    --bg:#08131C; --panel:#102130; --line:#21394C; --line2:#152430;
    --text:#BCC8D4; --bright:#E4EEF6; --muted:#6F7F8F; --dim:#4A5A6A; --faint:#34424F;
    --success:#46D4B2; --missable:#CDA557; --warning:#F2706C; --story:#6E9AD0;
    --chrome:#6E7A86; --chrome-active:#D8E0E9;
  }
  :root[data-theme="light"]{
    --bg:#DCE3EB; --panel:#E8EDF2; --line:#BEC8D2; --line2:#D0D8E0;
    --text:#10202E; --bright:#06111C; --muted:#556270; --dim:#78838F; --faint:#A2AEBA;
    --success:#0A9078; --missable:#8A6210; --warning:#CC3F3B; --story:#35588C;
    --chrome:#5F6076; --chrome-active:#33334A;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg)}
  body{
    color:var(--text);font-family:var(--mono);font-size:15.5px;line-height:1.55;
    -webkit-text-size-adjust:100%;
  }
  #app{
    max-width:720px;margin:0 auto;
    padding:calc(20px + env(safe-area-inset-top)) 14px calc(80px + env(safe-area-inset-bottom));
  }
  .kicker{font-size:11px;letter-spacing:.22em;color:var(--muted);margin-bottom:4px}
  h1{font-size:28px;letter-spacing:.14em;margin:0 0 14px;font-weight:700;color:var(--bright)}
  h2{font-size:18px;margin:0;letter-spacing:.08em;color:var(--bright);font-weight:700}
  header{border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:14px;position:relative}
  .readout{font-size:14px;letter-spacing:.1em;margin-bottom:8px}
  .sub{font-size:12px;color:var(--muted);letter-spacing:.04em}
  /* gear ⚙ — the app's one concession to iconography; discloses the Settings sheet. Neutral chrome. */
  .gearbtn{position:absolute;top:0;right:0;background:none;border:1px solid var(--faint);border-radius:3px;
    color:var(--chrome);font-size:15px;line-height:1;padding:5px 8px;cursor:pointer}
  .gearbtn.on{border-color:var(--chrome-active);color:var(--chrome-active);background:color-mix(in srgb,var(--chrome-active) 10%,transparent)}
  header>.kicker{padding-right:44px}   /* reserve room so the long BUILD kicker never runs under the gear */
  /* header footer band: counter+save on the left, Ask-a-Hint sitting in the open space to the
     right — vertically centred across both lines, and centred within the blank (not edge-wedged). */
  .headfoot{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px}
  .headfoot-text{flex:0 1 auto;min-width:0}
  .headfoot .hintbtn{margin:0 auto}
  /* Ask-for-a-Hint: a distinct action (hand off to Claude), NOT a filter. Hue-free neutral chrome
     under the two-layer model (was amber — a content hue it had no business wearing). */
  .hintbtn{font-family:var(--mono);font-size:12px;letter-spacing:.06em;background:transparent;
    border:1px solid var(--faint);color:var(--chrome);border-radius:3px;padding:7px 11px;cursor:pointer;white-space:nowrap;flex-shrink:0}
  .hintbtn.on{background:color-mix(in srgb,var(--chrome-active) 10%,transparent);border-color:var(--chrome-active);color:var(--chrome-active)}
  .bar{height:4px;background:var(--line2);border-radius:2px;overflow:hidden}
  .bar>div{height:100%;background:linear-gradient(90deg,color-mix(in srgb,var(--success) 55%,var(--panel)),var(--success));transition:width .4s ease}
  .blink{animation:blink 1.1s steps(1) infinite;margin-left:6px;color:var(--chrome-active)}
  @keyframes blink{50%{opacity:0}}
  @media (prefers-reduced-motion:reduce){.blink{animation:none}}
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 22px}
  button.chip{
    font-family:var(--mono);font-size:12.5px;letter-spacing:.06em;background:transparent;
    border:1px solid var(--faint);color:var(--chrome);border-radius:3px;padding:7px 12px;cursor:pointer;
  }
  /* active filter (.on) and proceed (.go) are both the neutral active-chrome state now */
  button.chip.on,button.chip.go{border-color:var(--chrome-active);color:var(--chrome-active);background:color-mix(in srgb,var(--chrome-active) 10%,transparent)}
  button.chip.danger{border-color:var(--warning);color:var(--warning);background:color-mix(in srgb,var(--warning) 10%,transparent)}
  button.chip:disabled{border-color:var(--faint);color:var(--dim);cursor:default;background:transparent}
  button:focus-visible,textarea:focus-visible,a:focus-visible{outline:2px solid var(--chrome-active);outline-offset:2px}
  section{margin-bottom:30px}
  .sechead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:10px;width:100%;background:none;border:none;padding:0;color:inherit;font-family:inherit;text-align:left;cursor:pointer}
  .chev{color:var(--faint);font-size:13px;margin-right:8px}
  .secright{display:flex;align-items:baseline;gap:10px}
  .seccount{font-size:13px;color:var(--muted)}
  .deadline{
    border:1px solid color-mix(in srgb,var(--warning) 40%,transparent);
    background:color-mix(in srgb,var(--warning) 8%,transparent);color:color-mix(in srgb,var(--warning) 55%,var(--bright));
    font-size:13px;padding:10px 12px;border-radius:3px;margin-bottom:12px;
  }
  .deadline b{color:var(--warning);font-weight:400;margin-right:4px}
  /* Opt-in tuck (Roadmap 8): a secured phase shows a done banner in place, then folds into
     a COMPLETED zone when tucked. Success accent = the app's secured colour (game content). */
  .donebanner{display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    border:1px solid color-mix(in srgb,var(--success) 35%,transparent);background:color-mix(in srgb,var(--success) 6%,transparent);padding:10px 12px;border-radius:3px;margin:16px 0 2px}
  .donetext{flex:1;min-width:150px;display:flex;flex-direction:column;gap:4px}
  .donebadge{color:var(--success);font-size:12px;letter-spacing:.16em;font-weight:700}
  .donenote{font-size:12px;color:color-mix(in srgb,var(--success) 32%,var(--text));line-height:1.5;letter-spacing:.02em}
  .donezone{font-size:11px;color:var(--dim);letter-spacing:.28em;text-align:center;margin:26px 0 16px;border-top:1px solid var(--line);padding-top:18px}
  .secdone{color:var(--success);font-size:12px}
  .tucked .sechead{opacity:.72}
  .hintbox{margin:14px 0 22px;padding:13px 14px 3px;border:1px solid var(--line);border-radius:4px}
  .row{border-bottom:1px solid var(--line2);padding:2px 0}
  .row.done{opacity:.45}
  .rowtop{display:flex;align-items:flex-start;gap:10px;padding:10px 0}
  .cb{
    width:24px;height:24px;min-width:24px;border-radius:3px;border:1.5px solid var(--faint);
    display:inline-flex;align-items:center;justify-content:center;cursor:pointer;margin-top:1px;
    font-size:13px;background:transparent;color:var(--bg);padding:0;
  }
  .cb.on{border-color:var(--success);background:var(--success);font-weight:700}
  .rowlabel{
    display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;background:none;border:none;
    color:inherit;font-family:inherit;font-size:15px;text-align:left;cursor:pointer;padding:0;
    flex:1;line-height:1.5;
  }
  .row.done .rowtitle{text-decoration:line-through}
  .tag{
    font-size:10px;letter-spacing:.16em;border:1px solid;border-radius:2px;padding:1px 5px;
    flex-shrink:0;transform:translateY(-1px);
  }
  .plus{color:var(--dim);margin-left:auto;flex-shrink:0}
  .detail{
    font-size:14px;color:var(--detail);margin-left:10px;padding:0 0 14px 20px;
    border-left:2px solid var(--line);line-height:1.65;
  }
  .notehint{font-size:12.5px;color:var(--muted);margin-bottom:10px;line-height:1.6}
  /* mechnote = how the app behaves (fine print), visually quieter than the .notehint purpose copy */
  .mechnote{font-size:11.5px;color:var(--dim);margin:-4px 0 12px;line-height:1.55;letter-spacing:.02em}
  .hintlegend{font-size:11.5px;color:var(--muted);margin-bottom:9px;line-height:1.7;letter-spacing:.02em}
  .noterow{display:flex;gap:10px;align-items:flex-start;border-bottom:1px solid var(--line2);padding:10px 0}
  .notetext{font-size:14.5px;color:var(--text);line-height:1.55;white-space:pre-wrap;word-break:break-word}
  .notets{font-size:11px;color:var(--dim);margin-top:3px;letter-spacing:.1em}
  .notebtn{
    background:none;border:1px solid var(--faint);border-radius:3px;color:var(--chrome);
    font-family:var(--mono);font-size:12px;padding:5px 9px;cursor:pointer;flex-shrink:0;margin-top:2px;
  }
  /* Nudge? hands the note to Claude — but under the two-layer model it's still chrome, so it's
     neutral like Edit/✕ now (the old cyan tint was a content hue on a control). Kept as a hook. */
  .notebtn.nudge{border-color:var(--faint);color:var(--chrome);background:transparent}
  .notebtn.on{color:var(--chrome-active);border-color:var(--chrome-active);background:color-mix(in srgb,var(--chrome-active) 10%,transparent)}
  .notebtn:disabled{color:var(--dim);border-color:var(--faint);cursor:default}
  .notebtns{display:flex;flex-direction:column;align-items:stretch;gap:6px;flex-shrink:0}
  .notebtns .notebtn{margin-top:0}
  .notebtnrow{display:flex;gap:8px}
  .editbtns{display:flex;gap:8px;margin-top:8px}
  .inputrow{display:flex;gap:8px;margin-bottom:14px;align-items:stretch}
  textarea{
    flex:1;background:var(--panel);border:1px solid var(--faint);border-radius:3px;color:var(--text);
    font-family:var(--mono);font-size:16px;padding:9px 10px;line-height:1.5;resize:vertical;min-height:70px;width:100%;
  }
  .hintpanel{padding:4px 0 14px;border-bottom:1px solid var(--line2)}
  /* reveal control: segmented level picker + one Ask (was three instant buttons) */
  .revrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:2px}
  .hintstatus{font-size:12px;color:var(--chrome-active);letter-spacing:.06em;margin-top:10px;line-height:1.6}
  footer{
    font-size:11.5px;color:var(--dim);border-top:1px solid var(--line);padding-top:14px;
    letter-spacing:.03em;line-height:1.7;
  }
  .savestate{font-size:12px;letter-spacing:.04em;margin-top:6px}
  .tabs{display:flex;margin:2px 0 0;border-bottom:1px solid var(--line)}
  .tab{flex:1;font-family:var(--mono);font-size:13px;letter-spacing:.14em;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);padding:11px 6px;cursor:pointer;text-align:center}
  .tab.on{color:var(--bright);border-bottom-color:var(--chrome-active)}
  .tabsub{font-size:12px;color:var(--muted);margin:9px 0 18px;letter-spacing:.03em;line-height:1.5}
  .zone{font-size:11px;color:var(--dim);letter-spacing:.05em;white-space:nowrap}
  .excl{font-size:12px;color:var(--muted);border-top:1px solid var(--line2);padding-top:13px;margin-top:6px;line-height:1.65}
  /* first-visit notice: an app-status card, so its accent is bright neutral chrome, not a content hue */
  .notice{border:1px solid var(--chrome-active);background:color-mix(in srgb,var(--chrome-active) 6%,transparent);border-radius:4px;padding:14px 16px;margin-bottom:18px}
  .notice h2{color:var(--bright);margin-bottom:8px}
  .notice p{font-size:13.5px;color:var(--text);line-height:1.6;margin:0 0 10px}
  .notice b{color:var(--bright);font-weight:700}
  /* tappable backup nudge — one-tap Export even with Data behind the gear */
  .lastexp{display:inline-block;margin-bottom:8px;color:var(--muted);background:none;border:none;padding:0;
    font-family:var(--mono);font-size:inherit;letter-spacing:inherit;text-align:left;cursor:pointer;text-decoration:underline;text-decoration-color:var(--faint);text-underline-offset:2px}
  .lastexp.stale{color:var(--chrome-active);text-decoration-color:var(--chrome)}
  header.cleared{border-bottom-color:var(--success)}
  .readout.clear{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .clearflag{color:var(--success);font-weight:700;letter-spacing:.2em;font-size:16px;text-shadow:0 0 12px color-mix(in srgb,var(--success) 45%,transparent)}
  .clearcnt{color:var(--muted);font-size:12px;letter-spacing:.1em}
  .bar.clear>div{background:var(--success)}
  /* ————— gear Settings sheet (Roadmap 10) — Theme / Data / About ————— */
  .settings{border:1px solid var(--line);background:var(--panel);border-radius:4px;padding:15px 16px;margin-bottom:18px}
  .setgroup{margin-bottom:16px}
  .setgroup:last-child{margin-bottom:0}
  .setlabel{font-size:11px;letter-spacing:.2em;color:var(--muted);margin-bottom:9px}
  .setnote{font-size:11.5px;color:var(--dim);margin-top:9px;line-height:1.55}
  .setrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .srclink{font-family:var(--mono);font-size:12.5px;letter-spacing:.06em;color:var(--chrome);text-decoration:none;
    border:1px solid var(--faint);border-radius:3px;padding:7px 12px;display:inline-block}
  /* segmented control — shared by the Theme picker and the reveal picker (hue-free chrome) */
  .seg{display:inline-flex;border:1px solid var(--faint);border-radius:3px;overflow:hidden;max-width:100%;flex-wrap:wrap}
  .seg button{font-family:var(--mono);font-size:12.5px;letter-spacing:.04em;background:none;border:none;
    border-right:1px solid var(--faint);color:var(--chrome);padding:8px 13px;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px}
  .seg button:last-child{border-right:none}
  .seg button.on{background:color-mix(in srgb,var(--chrome-active) 12%,transparent);color:var(--chrome-active)}
  .swatch{width:11px;height:11px;border-radius:2px;border:1px solid var(--faint);display:inline-block;flex-shrink:0}
  .swatch.auto{background:linear-gradient(135deg,#08131C 0 50%,#DCE3EB 50% 100%)}
  .swatch.dark{background:#08131C}
  .swatch.light{background:#DCE3EB}
  /* graph-paper texture — scoped to the field-notes "notebook" surface only; checklist stays flat */
  .notebook{
    border:1px solid var(--line);border-radius:4px;padding:15px 16px;
    background-color:var(--panel);
    background-image:linear-gradient(color-mix(in srgb,var(--line) 55%,transparent) 1px,transparent 1px),
      linear-gradient(90deg,color-mix(in srgb,var(--line) 55%,transparent) 1px,transparent 1px);
    background-size:22px 22px;background-position:-1px -1px;
  }
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="importFile" accept=".json,application/json" style="display:none">
<script src="ledger-data.js"></script>
<script>
"use strict";
const HINT_LEVELS = [
  // A reveal intensity ramp (gentle → full spoiler), chosen via a segmented selector then Ask.
  // Under the two-layer colour model the control is hue-free chrome (the old violet ramp was a
  // content-style accent on what is really an interface control), so no per-level colour here.
  { n: 1, label: "Nudge", blurb: "a vague pointer, no names", desc: "a vague directional nudge ONLY: no location names, no item names, no puzzle mechanics. Just tell the player what to pay attention to or reconsider, in one or two sentences." },
  { n: 2, label: "Hint", blurb: "the area or kind of thing", desc: "a concrete hint: name the relevant area or the KIND of thing they should look for or do, but do not state the final solution, code, or exact item." },
  { n: 3, label: "Spoil it", blurb: "the full solution", desc: "the full solution, stated plainly and step by step. Still do not reveal story plot points, character fates, or anything beyond this specific puzzle/objective." },
];

const SECTIONS = [
  {
    id: "setup",
    kicker: "",
    title: "Standing Orders",
    sub: "Rules that hold for the entire playthrough—check each off once you understand it.",
    doneLabel: "✓ ALL UNDERSTOOD",
    doneNote: "These hold for the whole run — tucked for reference, not retired.",
    deadline: null,
    items: [
      {
        id: "s1", tag: "RULE", title: "Update the game to the latest patch",
        detail:
          "Several launch-window trophy bugs are fixed in patches. Patch 1.5 (Jan 2026) fixed a Lend an Ear blocker (skipping a chat with Lukhan before handing over the radio) and trophy-count issues; a Sept 2025 patch fixed counters polluted by demo/other-save data. Playing on 1.6+ removes most of the horror stories you'll read in older threads.",
      },
      {
        id: "s2", tag: "RULE", title: "Never spend Lymbic Shards on consumables",
        detail:
          "Three trophies (To the Teeth, Accessorizing, Good Vibrations) need maxed upgrades. Once every Timeloop is closed, enemies stop respawning and shards become finite. Hoard every shard for upgrades and you cannot miss these.",
      },
      {
        id: "s3", tag: "RULE", title: "Kill the colored Haze itself, every time",
        detail:
          "Some enemies spawn a colored abstract blob (Haze). You need 40 Haze kills at each of tier I, II and III. If you burst the carrier down before the Haze spawns, or kill the pale enemy without popping the blob, the kill does NOT count — a PowerPyx reader finished world cleanup stuck at 39/40 tier III. Let the blob appear, then destroy it. Check the PS5 trophy progress trackers periodically.",
      },
      {
        id: "s4", tag: "RULE", title: "Talk to every named NPC the moment you see them",
        detail:
          "Lend an Ear needs a conversation with all 21 dialogue NPCs (the ones that open a full dialogue screen). Several die or relocate as the story moves. Habit: exhaust dialogue immediately on first sight. The checklist below flags every risky one at the right moment.",
      },
      {
        id: "s5", tag: "RULE", title: "Wear every cap as soon as you find it",
        detail:
          "Passion for Fashion = equip all 10 baseball caps. Do it from the Loadout menu when each drops, and make sure the 'no hat' cosmetic toggle is OFF when equipping, or the game may not register the wear.",
      },
      {
        id: "s6", tag: "RULE", title: "Manual-save at save points before turning anything in",
        detail:
          "There are no separate save slots, so a pre-turn-in save is your only short rewind if a conversation goes sideways. Difficulty doesn't matter for any trophy — play on whatever is fun.",
      },
    ],
  },
  {
    id: "act1",
    kicker: "PHASE 01",
    title: "Act 1",
    doneNote: "Cleared to end Act 1 — place the first Keystone at Lake Cynon.",
    deadline:
      "POINT OF NO RETURN: placing the first Keystone at Lake Cynon ends Act 1. Do not travel to Lake Cynon for the story until every box below is checked.",
    items: [
      { id: "a1", tag: "STORY", title: "Senedra Forest — Ernest Caddel", detail: "In the basement of the first house. Story-required, can't be missed — listed so the NPC counter stays in order." },
      { id: "a2", tag: "STORY", title: "Senedra Forest — wounded soldier by the APC", detail: "Just after Caddel's house. Story-required." },
      { id: "a3", tag: "MISS", title: "Jova — Captain Vaas", detail: "On the platform at the entrance to the town of Jova. He dies when Act 2 begins — if you never spoke to him, Lend an Ear is gone. Talk to him now." },
      { id: "a4", tag: "MISS", title: "Jova — Abbot Jaffer", detail: "On the road between Captain Vaas and the blacksmith shop. He later relocates; safest to talk here." },
      { id: "a5", tag: "MISS", title: "Jova — Rebecca", detail: "On the roof of the house with the treehouse in the yard, near Captain Vaas. She later relocates; talk here." },
      { id: "a6", tag: "MISS", title: "Good Deed 3 — Land of Milk and Honey", detail: "Speak with the woman in the underground level of the house on Jova's west side. Take the empty baby bottles to Ernest Caddel in Senedra Forest, bring the milk back to her." },
      { id: "a7", tag: "MISS", title: "Good Deed 4 — Love Thy Neighbour  ★ feeds Ever After", detail: "Speak to the woman in the house near Abbot Jaffer. Grab the Bloodied Plushie from the tree with the hanging bodies east of Jova, trade it to the man in the house above the milk-quest woman, then trade the picture you get back to the first woman. Must be done in Act 1 — one of the trophies for gathering everyone later depends on it." },
      { id: "a8", tag: "MISS", title: "Good Deed 5 — Asunder", detail: "Find the 'Worried Wife' letter behind the house with the drunk soldier in Jova; deliver it to the man by the excavator at the area entrance." },

// BUILD split into number + codename (Roadmap 8, item 6). Display shape: "9.0 (FRONTIER)".
// Used verbatim in the header kicker, the export payload's `build` field, and mirrored in
// the README build log + the CLAUDE.md pin.
const BUILD_N = "9.2";
const BUILD_NAME = "HADEA";
const BUILD = BUILD_N + " (" + BUILD_NAME + ")";
const KEY = "hiu-plat-v1";
const ALL_ITEMS = SECTIONS.flatMap(s => s.items);
const MISS_IDS = ALL_ITEMS.filter(i => i.tag === "MISS" || i.tag === "WARN").map(i => i.id);
const TAG_COLOR = { MISS:"var(--missable)", WARN:"var(--warning)", STORY:"var(--story)", RULE:"var(--success)", SAFE:"var(--muted)" };
const TAG_LABEL = { MISS:"MISSABLE", WARN:"WARNING", STORY:"STORY", RULE:"RULE", SAFE:"SAFE" };
// Completionist ledger (from ledger-data.js; empty-safe if that file fails to load)
const CATS = (typeof LEDGER !== "undefined" && Array.isArray(LEDGER)) ? LEDGER : [];
// Shared-checkbox key: ledger items with a campaignId tick the SAME storage id as their
// Campaign row (so existing progress shows through automatically); others use their own id.
function ledgerKey(it){ return it.campaignId || it.id; }
// Aggregate rows: one Campaign checkbox that stands for several independent ledger items.
// The Campaign row is "done" only when every member is; toggling it sets/clears all members.
// (b4 = the four "A Light in the Dark" flares gd13–16, tracked individually in Completionist.)
const AGGREGATES = { b4: ["gd13","gd14","gd15","gd16"] };
function isDone(id){
  const m = AGGREGATES[id];
  return m ? m.every(k => !!state.checked[k]) : !!state.checked[id];
}
// Phase completion for the opt-in tuck (Roadmap 8): a phase is tuckable when its
// point-of-no-return work is finished. Standing Orders = all six understood; Acts =
// HAS missables AND every MISS/WARN secured (never retire a missable-less phase vacuously);
// the endgame terminus never tucks.
function phaseMiss(sec){ return sec.items.filter(i => i.tag === "MISS" || i.tag === "WARN"); }
function phaseTuckable(sec){
  if(sec.id === "endgame") return false;
  if(sec.id === "setup") return sec.items.every(i => isDone(i.id));
  const miss = phaseMiss(sec);
  return miss.length > 0 && miss.every(i => isDone(i.id));
}

// ————— state —————
let state = {
  checked:{}, notes:[], open:{}, hintOpen:{}, filterMiss:false, filterRemaining:false,
  confirmReset:false, draft:"", stuckDraft:"", saveState:"idle",
  hintMsg:{}, revealLevel:{}, copied:false, lastExport:null, editId:null, editDraft:"",
  settingsOpen:false,   // transient — the gear sheet always starts closed (never persisted)
  ui:{ collapsed:{}, askOpen:false, tab:"campaign", noticeSeen:false, tucked:{}, theme:"auto" },
};
const UI_KEY = "hiu-ui-v1";
function loadUI(){
  try{ const raw = localStorage.getItem(UI_KEY);
    if(raw){ const p = JSON.parse(raw);
      state.ui.collapsed = (p && p.collapsed) || {};
      // askOpen is deliberately NOT restored — the hint box is a transient "stuck right now"
      // tool, so it always starts closed rather than springing open on load.
      state.ui.tab = (p && p.tab === "completionist") ? "completionist" : "campaign";
      state.ui.noticeSeen = !!(p && p.noticeSeen);
      state.ui.tucked = (p && p.tucked) || {};
      state.ui.theme = (p && (p.theme === "dark" || p.theme === "light")) ? p.theme : "auto"; } }catch(e){}
}
// Apply the chosen theme: a manual pick sets [data-theme] (beats the media query); Auto clears it
// and follows iOS. Either way, swap the status-bar chrome to match the EFFECTIVE mode.
function applyTheme(){
  const t = state.ui.theme, root = document.documentElement;
  if(t === "dark" || t === "light") root.setAttribute("data-theme", t);
  else root.removeAttribute("data-theme");
  let dark = t === "dark";
  if(t === "auto"){ try{ dark = window.matchMedia("(prefers-color-scheme: dark)").matches; }catch(e){ dark = true; } }
  const tc = document.querySelector('meta[name="theme-color"]');
  if(tc) tc.setAttribute("content", dark ? "#08131C" : "#DCE3EB");
  const sb = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
  // dark: translucent bar with light glyphs over the navy ground; light: opaque bar, dark glyphs
  if(sb) sb.setAttribute("content", dark ? "black-translucent" : "default");
}
function setTheme(t){ state.ui.theme = (t === "dark" || t === "light") ? t : "auto"; saveUI(); applyTheme(); render(); }
function saveUI(){ try{ localStorage.setItem(UI_KEY, JSON.stringify(state.ui)); }catch(e){} }

const META_KEY = "hiu-meta-v1";   // operational metadata (kept out of the sync-reserved run data)
function loadMeta(){ try{ const raw = localStorage.getItem(META_KEY);
  if(raw){ const p = JSON.parse(raw); if(p && typeof p.lastExport === "string") state.lastExport = p.lastExport; } }catch(e){} }
function saveMeta(){ try{ localStorage.setItem(META_KEY, JSON.stringify({lastExport: state.lastExport})); }catch(e){} }

function loadState(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){
      const p = JSON.parse(raw);
      if(p && (p.checked || p.notes)){ state.checked = p.checked||{}; state.notes = Array.isArray(p.notes)?p.notes:[]; }
    }
    state.saveState = "saved";
  }catch(e){ state.saveState = "error"; }
}
function persist(){
  try{
    localStorage.setItem(KEY, JSON.stringify({checked:state.checked, notes:state.notes}));
    state.saveState = "saved";
  }catch(e){ console.error(e); state.saveState = "error"; }
}
function migrateState(){
  // 8.2: the four "A Light in the Dark" flares moved off the shared b4 key onto
  // individual keys. Fan a legacy b4 tick out to all four, then drop the dead key.
  if(state.checked.b4){
    (AGGREGATES.b4 || []).forEach(k => { state.checked[k] = true; });
    delete state.checked.b4;
    persist();
  }
}

// ————— hint handoff —————
function hintPrompt(topic, levelN){
  const lv = HINT_LEVELS.find(l => l.n === levelN);
  return 'You are a spoiler-careful hint assistant for the video game "Hell is Us" ' +
    '(2025, Rogue Factor — third-person action-adventure set in the country of Hadea; ' +
    'no map markers, puzzle- and clue-driven). I am stuck on the following:\n\n' +
    '"' + topic + '"\n\n' +
    'If you are not certain what this refers to or what the solution is, use web search ' +
    '(good sources: powerpyx.com, game8.co, gamerguides.com) to find out first. ' +
    'Then reply with ' + lv.desc + '\n\n' +
    'Hard rules: reveal nothing beyond what this hint level permits; never mention story plot points or twists; ' +
    'no preamble; 80 words maximum.';
}
async function hintGo(panelId, topic, levelN){
  const prompt = hintPrompt(topic.trim(), levelN);
  let copied = false;
  try{ await navigator.clipboard.writeText(prompt); copied = true; }
  catch(e){ /* clipboard can fail outside user-gesture edge cases */ }
  state.hintMsg[panelId] = copied
    ? "Prompt copied ✓ — opening Claude. If the message box is empty, paste."
    : "Couldn't copy automatically — opening Claude; use Copy prompt below.";
  render();
  window.open("https://claude.ai/new?q=" + encodeURIComponent(prompt), "_blank");
}

// ————— helpers —————
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function stamp(){ return new Date().toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function autosize(el){ if(!el) return; el.style.height="auto"; el.style.height=(el.scrollHeight+2)+"px"; }

// ————— actions —————
function toggleCheck(id){
  const m = AGGREGATES[id];
  if(m){ const allOn = m.every(k => !!state.checked[k]); m.forEach(k => { state.checked[k] = !allOn; }); }
  else { state.checked[id] = !state.checked[id]; }
  // Auto-surface: a tucked phase that's no longer complete returns to the live area — an
  // incomplete phase must never hide in COMPLETED. Re-checking flips it back to done-in-place
  // (with a fresh Tuck away ↓), so nothing ever re-sinks on its own.
  let surfaced = false;
  for(const secId of Object.keys(state.ui.tucked)){
    const sec = SECTIONS.find(s => s.id === secId);
    if(!sec || !phaseTuckable(sec)){ delete state.ui.tucked[secId]; state.ui.collapsed[secId] = false; surfaced = true; }
  }
  if(surfaced) saveUI();
  persist(); render();
}
function toggleOpen(id){ state.open[id] = !state.open[id]; render(); }
function toggleHint(id){ state.hintOpen[id] = !state.hintOpen[id]; render(); }
function addNote(){
  const t = state.draft.trim(); if(!t) return;
  state.notes.unshift({id:"n"+Date.now(), text:t, ts:stamp()});
  state.draft = ""; persist(); render();
}
function delNote(id){ state.notes = state.notes.filter(n => n.id !== id); persist(); render(); }
function startEdit(id){
  const n = state.notes.find(x => x.id === id); if(!n) return;
  state.editId = id; state.editDraft = n.text;
  state.hintOpen[id] = false;     // don't leave a stale hint panel open over the editor
  render();
  const ed = document.getElementById("editdraft");   // size to the note, focus, cursor to end
  if(ed){ autosize(ed); ed.focus(); ed.setSelectionRange(ed.value.length, ed.value.length); }
}
function saveEdit(id){
  const t = state.editDraft.trim();
  if(t){ const n = state.notes.find(x => x.id === id); if(n){ n.text = t; persist(); } }  // ts preserved — never re-dated
  state.editId = null; state.editDraft = ""; render();   // empty save reverts (mirrors addNote's guard)
}
function cancelEdit(){ state.editId = null; state.editDraft = ""; render(); }
function copyNotes(){
  const txt = state.notes.map(n => "["+n.ts+"] "+n.text).join("\n");
  navigator.clipboard.writeText(txt).then(()=>{ state.copied = true; render();
    setTimeout(()=>{ state.copied = false; render(); }, 2000); });
}
function exportData(){
  const now = new Date();
  const blob = new Blob([JSON.stringify({checked:state.checked, notes:state.notes, build:BUILD, exportedAt:now.toISOString()}, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "hadea-field-log-backup-" + now.toISOString().slice(0,10) + ".json";
  document.body.appendChild(a); a.click(); a.remove();
  state.lastExport = now.toISOString(); saveMeta(); render();
}
function importData(file){
  const r = new FileReader();
  r.onload = () => {
    try{
      const p = JSON.parse(r.result);
      if(!p || (typeof p.checked !== "object" && !Array.isArray(p.notes))) throw new Error("bad shape");
      if(!confirm("Replace current progress and notes with this backup?")) return;
      state.checked = p.checked || {};
      state.notes = Array.isArray(p.notes) ? p.notes : [];
      persist(); render();
    }catch(e){ alert("That file doesn't look like a Field Log backup."); }
  };
  r.readAsText(file);
}
function resetRun(){ state.checked = {}; state.confirmReset = false; persist(); render(); }

// ————— render —————
function hintPanelHTML(panelId, topic){

  const lvl = state.revealLevel[panelId] || 1;   // default to the gentlest level

  const seg = HINT_LEVELS.map(lv =>

  const legend = HINT_LEVELS.map(lv => '<b>'+esc(lv.label)+'</b> '+esc(lv.blurb)).join(' · ');
  return '<div class="hintpanel"><div class="hintlegend">How much to reveal — '+legend+'</div>'+
    '<div class="revrow"><div class="seg">'+seg+'</div>'+
    '<button class="chip'+(usable?" go":"")+'" '+(usable?"":"disabled ")+'data-act="ask" data-panel="'+panelId+'">Ask ↗</button>'+

}

function noticeHTML(){

    '<div class="kicker">FIRST VISIT</div>'+

function exportStatus(){
  if(!state.lastExport) return { text:"Last export: never — back up to keep your run safe.", stale:true };
  const then = new Date(state.lastExport).getTime();
  if(isNaN(then)) return { text:"", stale:false };
  const days = Math.floor((Date.now() - then) / 86400000);
  const when = days <= 0 ? "today" : days === 1 ? "yesterday" : days + " days ago";
  return { text:"Last export: " + when + ".", stale: days >= 7 };
}
function footerHTML(){
  const es = exportStatus();
  // Tappable → Export, so the backup nudge stays one tap even with Data tucked behind the gear.
  const line = es.text ? '<button class="lastexp'+(es.stale?" stale":"")+'" data-act="export" title="Export backup now">'+esc(es.text)+'</button>' : "";
  return '<footer>'+line+'Compiled 2 Jul 2026 from PowerPyx (trophy, missables &amp; walkthrough pages + reader reports), Push Square, Game8, Neoseeker, PSNProfiles &amp; TrueTrophies threads, and official patch notes (1.4–1.6). Data lives in this browser\'s storage on this device — use Export backup for a portable copy.</footer>';
}
function renderCompletionist(){
  let h = '<div class="controls">'+
    '<button class="chip'+(state.filterRemaining?" on":"")+'" data-act="filterrem">'+(state.filterRemaining?"◉":"○")+' FILTER: remaining only</button>'+
    '</div>';
  if(!CATS.length){
    return h + '<div class="notehint">Ledger data unavailable — ledger-data.js did not load.</div>';
  }
  for(const cat of CATS){
    const items = state.filterRemaining ? cat.items.filter(it => !state.checked[ledgerKey(it)]) : cat.items;
    const done = cat.items.filter(it => state.checked[ledgerKey(it)]).length;
    const folded = !!state.ui.collapsed[cat.id];
    h += '<section><button class="sechead" data-act="fold" data-id="'+cat.id+'">'+
      '<div><div class="kicker">'+esc(cat.trophy)+'</div><h2><span class="chev">'+(folded?"▸":"▾")+'</span>'+esc(cat.title)+'</h2></div>'+
      '<div class="secright"><span class="seccount">'+done+'/'+cat.count+'</span></div></button>';
    if(folded){ h += '</section>'; continue; }
    if(!items.length){ h += '<div class="notehint">All '+cat.count+' done.</div></section>'; continue; }
    for(const it of items){
      const key = ledgerKey(it), on = !!state.checked[key], op = !!state.open[it.id];
      h += '<div class="row'+(on?" done":"")+'"><div class="rowtop">'+
        '<button class="cb'+(on?" on":"")+'" data-act="check" data-id="'+key+'" aria-label="'+(on?"Mark incomplete":"Mark complete")+'">'+(on?"✓":"")+'</button>'+
        '<button class="rowlabel" data-act="open" data-id="'+it.id+'">'+
        (it.miss ? '<span class="tag" style="color:var(--missable);border-color:var(--missable)">MISSABLE</span>' : "")+
        '<span class="rowtitle">'+esc(it.name)+'</span>'+
        '<span class="zone">'+esc(it.zone)+'</span>'+
        '<span class="plus">'+(op?"−":"+")+'</span></button></div>'+
        (op ? '<div class="detail">'+esc(it.detail)+'</div>' : "")+'</div>';
    }
    h += '</section>';
  }
  h += '<div class="excl">Not tracked here: kill counts, one-off trophies, and story progress — your PS5 trophy list counts those. The Campaign\'s final phase has the pre-endgame audit.</div>';
  return h;
}
// One Campaign phase block. inZone = rendered inside the COMPLETED zone (tucked, folded,
// un-foldable for reference — no deadline/banner shown there).
function phaseHTML(sec, inZone){
  const secured = phaseTuckable(sec);
  const items = state.filterMiss ? sec.items.filter(i => i.tag === "MISS" || i.tag === "WARN") : sec.items;
  if(!inZone && !items.length) return "";                 // filter hid every row in a live phase
  const done = sec.items.filter(i => isDone(i.id)).length; // isDone() so aggregate rows (b4) count
  const folded = !!state.ui.collapsed[sec.id];
  const kick = sec.kicker ? '<div class="kicker">'+esc(sec.kicker)+'</div>' : "";
  let h = '<section'+(inZone ? ' class="tucked"' : '')+'><button class="sechead" data-act="fold" data-id="'+sec.id+'">'+
    '<div>'+kick+'<h2><span class="chev">'+(folded?"▸":"▾")+'</span>'+esc(sec.title)+'</h2></div>'+
    '<div class="secright">'+(secured?'<span class="secdone">✓</span>':'')+'<span class="seccount">'+done+'/'+sec.items.length+'</span></div></button>';
  if(folded) return h+'</section>';
  if(sec.sub) h += '<div class="notehint">'+esc(sec.sub)+'</div>';
  // Deadline warns at the top only while the phase is still live-and-unsecured.
  if(sec.deadline && !secured && !inZone) h += '<div class="deadline"><b>⚠</b> '+esc(sec.deadline)+'</div>';
  for(const it of items){
    const on = isDone(it.id), op = !!state.open[it.id];
    h += '<div class="row'+(on?" done":"")+'"><div class="rowtop">'+
      '<button class="cb'+(on?" on":"")+'" data-act="check" data-id="'+it.id+'" aria-label="'+(on?"Mark incomplete":"Mark complete")+'">'+(on?"✓":"")+'</button>'+
      '<button class="rowlabel" data-act="open" data-id="'+it.id+'">'+
      '<span class="tag" style="color:'+TAG_COLOR[it.tag]+';border-color:'+TAG_COLOR[it.tag]+'">'+TAG_LABEL[it.tag]+'</span>'+
      '<span class="rowtitle">'+esc(it.title)+'</span><span class="plus">'+(op?"−":"+")+'</span></button></div>'+
      (op ? '<div class="detail">'+esc(it.detail)+'</div>' : "")+'</div>';
  }
  // Secured: the done banner (badge + dynamic sentiment + Tuck) sits at the BOTTOM, where you
  // land after checking the last box; the ↓ points down to the COMPLETED zone it folds into.
  if(secured && !inZone){
    h += '<div class="donebanner"><div class="donetext"><span class="donebadge">'+esc(sec.doneLabel || "✓ MISSABLES SECURED")+'</span>'+
      (sec.doneNote ? '<div class="donenote">'+esc(sec.doneNote)+'</div>' : "")+'</div>'+
      '<button class="chip go" data-act="tuck" data-id="'+sec.id+'">Tuck away ↓</button></div>';
  }
  return h+'</section>';
}
function render(){
  const missDone = MISS_IDS.filter(id => isDone(id)).length;
  const allDone = ALL_ITEMS.filter(i => isDone(i.id)).length;
  const pct = Math.round(missDone / MISS_IDS.length * 100);
  const cleared = missDone === MISS_IDS.length;
  const ss = state.saveState;
  const saveHTML = ss==="saved" ? '<span style="color:var(--chrome-active)">SAVED ✓ · on this device</span>'
    : ss==="error" ? '<span style="color:var(--warning)">SAVE FAILED — storage unavailable (private browsing?)</span>' : "";

  const readout = cleared
    ? '<div class="readout clear"><span class="clearflag">THREATS: CLEAR</span>'+
      '<span class="clearcnt">'+missDone+'/'+MISS_IDS.length+' secured</span><span class="blink">▌</span></div>'
    : '<div class="readout"><span style="color:var(--muted)">MISSABLES SECURED&nbsp;</span>'+
      '<span style="color:var(--bright)">'+missDone+'/'+MISS_IDS.length+'</span>'+
      '<span class="blink">▌</span></div>';

  const hintBtn = '<button class="hintbtn'+(state.ui.askOpen?" on":"")+'" data-act="askhdr">Ask a Hint '+(state.ui.askOpen?"▾":"▸")+'</button>';
  let h = '<header'+(cleared?' class="cleared"':'')+'>'+
    '<button class="gearbtn'+(state.settingsOpen?" on":"")+'" data-act="gear" aria-label="Settings" aria-expanded="'+(state.settingsOpen?"true":"false")+'">⚙</button>'+
    '<div class="kicker">HADEA FIELD LOG · SINGLE-RUN PLATINUM · BUILD '+BUILD+'</div>'+
    '<h1>HELL IS US</h1>'+
    readout+
    '<div class="bar'+(cleared?' clear':'')+'"><div style="width:'+pct+'%"></div></div>'+
    '<div class="headfoot"><div class="headfoot-text"><div class="sub">'+(cleared ? "Every missable secured — nothing in this list can be lost. Mop up the collectibles whenever."
      : "All boxes checked: "+allDone+"/"+ALL_ITEMS.length)+'</div>'+
    '<div class="savestate">'+saveHTML+'</div></div>'+hintBtn+'</div></header>';

  if(state.settingsOpen) h += settingsHTML();   // gear sheet — sits right under the header, global to both tabs
  h += noticeHTML();

  // Ask-for-a-Hint box, launched from the header's amber button — global to both tabs,
  // rendered directly under the header (near its button).
  if(state.ui.askOpen){
    h += '<div class="hintbox">'+
      '<div class="notehint">Describe where you\'re stuck and pick how much you want revealed.</div>'+
      '<textarea id="stuck" rows="2" placeholder="e.g. The pillar puzzle in the marshes…" style="margin-bottom:8px">'+esc(state.stuckDraft)+'</textarea>'+
      hintPanelHTML("stuck", state.stuckDraft)+
      '<div class="mechnote" style="margin-top:8px">Each button copies a ready-made prompt and opens Claude.</div>'+
    '</div>';
  }

  const tab = (state.ui.tab === "completionist") ? "completionist" : "campaign";
  h += '<div class="tabs">'+
    '<button class="tab'+(tab==="campaign"?" on":"")+'" data-act="tab" data-tab="campaign">CAMPAIGN</button>'+
    '<button class="tab'+(tab==="completionist"?" on":"")+'" data-act="tab" data-tab="completionist">COMPLETIONIST</button>'+
    '</div>'+
    '<div class="tabsub">'+(tab==="campaign"
      ? "The playthrough in order—every point of no return flagged."
      : "Itemized lists for deeds, relics, mysteries, caps, and timeloops.")+'</div>';

  if(tab==="completionist"){
    h += renderCompletionist() + footerHTML();
    document.getElementById("app").innerHTML = h;
    return;
  }

  h += '<div class="controls">'+
    '<button class="chip'+(state.filterMiss?" on":"")+'" data-act="filter">'+(state.filterMiss?"◉":"○")+' FILTER: missables &amp; warnings only</button>'+
    '</div>';

  // Field notes — the "your notebook" surface; graph-paper texture is scoped to this block only
  h += '<section class="notebook"><div class="sechead"><div><div class="kicker">PERSONAL LOG</div><h2>Field notes</h2></div>'+
    '<div class="seccount">'+state.notes.length+'</div></div>'+
    '<div class="notehint">Sealed doors, unsolved symbols, places to revisit — log them here before the game lets you forget.</div>'+
    '<div class="mechnote">Notes survive a run reset. A note\'s Nudge? hands it to Claude for a spoiler-graded hint.</div>'+
    '<div class="inputrow"><textarea id="draft" rows="2" placeholder="e.g. Locked tower in Vyssa Hills…">'+esc(state.draft)+'</textarea>'+
    '<button class="chip'+(state.draft.trim()?" go":"")+'" data-act="lognote" '+(state.draft.trim()?"":"disabled")+' style="align-self:stretch">Log note</button></div>'+
    (state.notes.length ? '<div style="margin-bottom:10px"><button class="chip'+(state.copied?" go":"")+'" data-act="copynotes">'+(state.copied?"Copied ✓":"Copy all notes")+'</button></div>' : "");
  for(const n of state.notes){
    if(state.editId === n.id){
      const has = !!state.editDraft.trim();
      h += '<div class="noterow"><div style="flex:1">'+          // full-width editor: textarea spans the row, buttons drop below
        '<textarea id="editdraft" rows="3">'+esc(state.editDraft)+'</textarea>'+
        '<div class="notets" style="margin-top:4px">'+esc(n.ts)+'</div>'+
        '<div class="editbtns">'+
          '<button class="notebtn'+(has?" on":"")+'" data-act="savenote" data-id="'+n.id+'"'+(has?"":" disabled")+'>Save</button>'+
          '<button class="notebtn" data-act="canceledit" data-id="'+n.id+'">Cancel</button>'+
        '</div></div></div>';
      continue;
    }
    // Buttons stack at right (Edit/✕ over Nudge?) so the note text keeps its horizontal width.
    h += '<div class="noterow"><div style="flex:1"><div class="notetext">'+esc(n.text)+'</div><div class="notets">'+esc(n.ts)+'</div></div>'+
      '<div class="notebtns">'+
        '<div class="notebtnrow">'+
          '<button class="notebtn" data-act="edit" data-id="'+n.id+'">Edit</button>'+
          '<button class="notebtn" data-act="delnote" data-id="'+n.id+'" aria-label="Delete note">✕</button>'+
        '</div>'+
        '<button class="notebtn nudge'+(state.hintOpen[n.id]?" on":"")+'" data-act="nudge" data-id="'+n.id+'">Nudge?</button>'+
      '</div></div>';
    if(state.hintOpen[n.id]) h += hintPanelHTML(n.id, n.text);
  }
  h += '</section>';

  // Checklist sections — live phases in play order, then a COMPLETED zone for tucked ones.
  // Standing Orders (setup) leads while live; the endgame terminus never tucks.
  const liveSecs = [], tuckedSecs = [];
  for(const sec of SECTIONS){
    (state.ui.tucked[sec.id] && phaseTuckable(sec) ? tuckedSecs : liveSecs).push(sec);
  }
  for(const sec of liveSecs) h += phaseHTML(sec, false);
  if(tuckedSecs.length){
    h += '<div class="donezone">── COMPLETED ──</div>';
    for(const sec of tuckedSecs) h += phaseHTML(sec, true);
  }

  h += footerHTML();

  document.getElementById("app").innerHTML = h;
  autosize(document.getElementById("editdraft"));   // fit the in-place editor to the note height
}

// ————— events —————
document.getElementById("app").addEventListener("click", e => {
  const b = e.target.closest("[data-act]"); if(!b) return;
  const act = b.dataset.act, id = b.dataset.id;
  if(act==="check") toggleCheck(id);
  else if(act==="open") toggleOpen(id);
  else if(act==="nudge") toggleHint(id);
  else if(act==="delnote") delNote(id);
  else if(act==="edit") startEdit(id);
  else if(act==="savenote") saveEdit(id);
  else if(act==="canceledit") cancelEdit();
  else if(act==="lognote") addNote();
  else if(act==="copynotes") copyNotes();
  else if(act==="filter"){ state.filterMiss = !state.filterMiss; render(); }
  else if(act==="filterrem"){ state.filterRemaining = !state.filterRemaining; render(); }
  else if(act==="tab"){ state.ui.tab = b.dataset.tab === "completionist" ? "completionist" : "campaign"; saveUI(); render(); }
  else if(act==="dismissnotice"){ state.ui.noticeSeen = true; saveUI(); render(); }
  else if(act==="fold"){ const s = b.dataset.id;
    state.ui.collapsed[s] = !state.ui.collapsed[s]; saveUI(); render(); }
  else if(act==="tuck"){ state.ui.tucked[id] = true; state.ui.collapsed[id] = true; saveUI(); render(); }
  else if(act==="askhdr"){ state.ui.askOpen = !state.ui.askOpen; saveUI(); render(); }
  else if(act==="gear"){ state.settingsOpen = !state.settingsOpen; render(); }   // transient — not persisted
  else if(act==="settheme"){ setTheme(b.dataset.theme); }
  else if(act==="reopennotice"){ state.ui.noticeSeen = false; state.settingsOpen = false; saveUI(); render(); }
  else if(act==="reset"){ state.confirmReset = true; render(); }
  else if(act==="resetno"){ state.confirmReset = false; render(); }
  else if(act==="resetgo") resetRun();
  else if(act==="export") exportData();
  else if(act==="import") document.getElementById("importFile").click();
  else if(act==="revlevel"){ state.revealLevel[b.dataset.panel] = Number(b.dataset.level); render(); }
  else if(act==="ask"){
    const panel = b.dataset.panel;
    const topic = panel==="stuck" ? state.stuckDraft : (state.notes.find(n=>n.id===panel)||{}).text||"";
    hintGo(panel, topic, state.revealLevel[panel] || 1);
  }
  else if(act==="copyprompt"){
    const panel = b.dataset.panel;
    const topic = panel==="stuck" ? state.stuckDraft : (state.notes.find(n=>n.id===panel)||{}).text||"";
    navigator.clipboard.writeText(hintPrompt(topic.trim(), state.revealLevel[panel] || 1));
  }
});
document.getElementById("app").addEventListener("input", e => {
  if(e.target.id==="draft"){ state.draft = e.target.value;
    const btn = document.querySelector('[data-act="lognote"]');
    if(btn){ btn.disabled = !state.draft.trim(); btn.classList.toggle("go", !!state.draft.trim()); } }
  if(e.target.id==="editdraft"){ state.editDraft = e.target.value;
    const btn = document.querySelector('[data-act="savenote"]');
    if(btn){ btn.disabled = !state.editDraft.trim(); btn.classList.toggle("on", !!state.editDraft.trim()); }
    autosize(e.target); }
  if(e.target.id==="stuck"){ state.stuckDraft = e.target.value;
    // enable/disable the Ask button without a full re-render (keeps the textarea focused)
    const ok = state.stuckDraft.trim().length > 2;
    const ask = document.querySelector('[data-act="ask"][data-panel="stuck"]');
    if(ask){ ask.disabled = !ok; ask.classList.toggle("go", ok); } }
});
document.getElementById("importFile").addEventListener("change", e => {
  if(e.target.files && e.target.files[0]) importData(e.target.files[0]);
  e.target.value = "";
});

loadState();
migrateState();
loadUI();
loadMeta();
applyTheme();
render();

// Keep the status-bar chrome in sync with iOS when Theme = Auto and the system flips light/dark.
try{ window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => { if(state.ui.theme === "auto") applyTheme(); }); }catch(e){}

// Offline support (Roadmap item 2): register the cache-first service worker.
// Relative path → scope is this directory, so it works under the GitHub Pages
// project subpath. http(s) only; failures are non-fatal (app still runs online).
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
